<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无界未来 — 黑洞无限循环 LOGO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050816;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'Montserrat', 'PingFang SC', sans-serif;
  }
  .logo-container {
    position: relative; width: 100vw; height: 100vh;
    display: flex; justify-content: center; align-items: center;
  }
  canvas { display: block; }
  
  /* 响应式 */
  @media (max-width: 768px) {
    .logo-container { transform: scale(0.5); transform-origin: center center; }
  }
</style>
<!-- 引入 Montserrat 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
<div class="logo-container">
  <canvas id="logoCanvas"></canvas>
</div>

<script>
// ============================================
// 黑洞无限循环 LOGO - 完整参数实现
// 画布: 1920×1080 | 8秒循环 | 60FPS
// ============================================

const canvas = document.getElementById('logoCanvas');
const ctx = canvas.getContext('2d');

// --- 画布参数 ---
const W = 1920, H = 1080;
const centerX = W / 2, centerY = H / 2;
const ANIM_DURATION = 8000; // 8秒循环
let startTime = null;

// 设置画布大小
function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ============================================
// 一、黑洞核心（中央主体）
// ============================================
function drawBlackHole(time) {
  const elapsed = (time - startTime) % ANIM_DURATION;
  const cycle = elapsed / ANIM_DURATION; // 0~1
  
  // 黑洞半径: 285px
  const holeRadius = 285;
  
  // 自转: 8°/秒 → 64° 每 8 秒循环
  const rotation = (elapsed / 1000) * 8 * (Math.PI / 180);
  
  // 动态模糊强度 (0~14px 根据周期变化)
  const blurAmount = 7 + 7 * Math.sin(cycle * Math.PI * 2);
  
  // 引力扭曲: 42%
  const distortion = 0.42;
  
  // --- 绘制黑洞核心 ---
  ctx.save();
  ctx.translate(centerX, centerY);
  ctx.rotate(rotation);
  
  // 外层吸积盘 (外径 610px, 厚度 72px)
  const accretionOuter = 610;
  const accretionThickness = 72;
  
  // 吸积盘渐变: #FFF3D6 → #FFE7B8
  for (let i = 0; i < 3; i++) {
    const grad = ctx.createRadialGradient(0, 0, holeRadius + i * 20, 0, 0, accretionOuter / 2 + i * 30);
    grad.addColorStop(0, `rgba(255, 243, 214, ${0.3 - i * 0.08})`);
    grad.addColorStop(0.5, `rgba(255, 231, 184, ${0.2 - i * 0.05})`);
    grad.addColorStop(1, 'rgba(255, 231, 184, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, accretionOuter / 2 + i * 30, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // 吸积盘主体 (旋转条纹)
  for (let a = 0; a < Math.PI * 2; a += 0.05) {
    const r1 = holeRadius + 20 + Math.sin(a * 3 + rotation * 2) * 10;
    const r2 = r1 + accretionThickness;
    const alpha = 0.15 + 0.1 * Math.sin(a * 5 + rotation);
    ctx.beginPath();
    ctx.arc(0, 0, r1, a, a + 0.05);
    ctx.arc(0, 0, r2, a + 0.05, a, true);
    ctx.closePath();
    ctx.fillStyle = `rgba(255, 231, 184, ${alpha})`;
    ctx.fill();
  }
  
  // 黑洞核心 (#020409)
  const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, holeRadius);
  coreGrad.addColorStop(0, '#020409');
  coreGrad.addColorStop(0.7, '#050816');
  coreGrad.addColorStop(1, 'rgba(5, 8, 22, 0)');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(0, 0, holeRadius, 0, Math.PI * 2);
  ctx.fill();
  
  // 边缘羽化 (48px)
  const featherGrad = ctx.createRadialGradient(0, 0, holeRadius - 48, 0, 0, holeRadius + 20);
  featherGrad.addColorStop(0, 'rgba(2, 4, 9, 0)');
  featherGrad.addColorStop(0.5, 'rgba(2, 4, 9, 0.5)');
  featherGrad.addColorStop(1, 'rgba(2, 4, 9, 1)');
  ctx.fillStyle = featherGrad;
  ctx.beginPath();
  ctx.arc(0, 0, holeRadius + 20, 0, Math.PI * 2);
  ctx.fill();
  
  // Bloom 强度: 0.45
  ctx.shadowBlur = 45;
  ctx.shadowColor = 'rgba(255, 231, 184, 0.45)';
  ctx.fillStyle = 'rgba(255, 231, 184, 0.05)';
  ctx.beginPath();
  ctx.arc(0, 0, holeRadius * 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.restore();
}

// ============================================
// 二、无限能量环 (Infinity Loop)
// ============================================

// 无限符号路径参数
const INFINITY_WIDTH = 1580;
const INFINITY_HEIGHT = 520;
const INFINITY_THICKNESS = 26;

// 获取无限符号上的点 (t: 0~1)
function getInfinityPoint(t) {
  // 将 t 映射到参数方程
  const angle = t * Math.PI * 2;
  // 无限符号参数方程 (lemniscate of Bernoulli)
  const scale = INFINITY_WIDTH / 4;
  const a = scale;
  const cosT = Math.cos(angle);
  const sinT = Math.sin(angle);
  const denom = 1 + sinT * sinT;
  const x = a * cosT / denom;
  const y = a * cosT * sinT / denom;
  return { x: centerX + x, y: centerY + y * (INFINITY_HEIGHT / INFINITY_WIDTH) };
}

// 获取无限符号切线角度
function getInfinityAngle(t) {
  const delta = 0.001;
  const p1 = getInfinityPoint(t);
  const p2 = getInfinityPoint(t + delta);
  return Math.atan2(p2.y - p1.y, p2.x - p1.x);
}

// 绘制无限能量环
function drawInfinityLoop(time) {
  const elapsed = (time - startTime) % ANIM_DURATION;
  const cycle = elapsed / ANIM_DURATION;
  
  // --- 底层发光 (外发光半径 22px, 辉光阈值 0.72) ---
  ctx.save();
  ctx.shadowBlur = 22;
  ctx.shadowColor = 'rgba(105, 167, 255, 0.82)';
  
  // 绘制无限符号轨迹 (流光效果)
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    const offset = i * 0.005;
    for (let t = 0; t <= 1; t += 0.002) {
      const pt = getInfinityPoint(t + offset);
      if (t === 0) ctx.moveTo(pt.x, pt.y);
      else ctx.lineTo(pt.x, pt.y);
    }
    ctx.strokeStyle = `rgba(105, 167, 255, ${0.15 - i * 0.04})`;
    ctx.lineWidth = INFINITY_THICKNESS + i * 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  }
  ctx.restore();
  
  // --- 主轨迹 (双向循环流光) ---
  // 左侧顺时针, 右侧逆时针
  const flowSpeed = (elapsed / 1000) * 240; // 240 px/s
  
  // 流光尾迹: 40px
  for (let i = 0; i < 5; i++) {
    const trailT = (cycle * 2 + i * 0.05) % 1;
    const pt = getInfinityPoint(trailT);
    const angle = getInfinityAngle(trailT);
    
    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, 40 - i * 6);
    grad.addColorStop(0, `rgba(223, 242, 255, ${0.8 - i * 0.15})`);
    grad.addColorStop(0.5, `rgba(105, 167, 255, ${0.4 - i * 0.08})`);
    grad.addColorStop(1, 'rgba(105, 167, 255, 0)');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 40 - i * 6, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // 反向流光 (右侧逆时针)
  for (let i = 0; i < 5; i++) {
    const trailT = (1 - cycle * 2 + i * 0.05) % 1;
    const pt = getInfinityPoint(trailT);
    
    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, 35 - i * 5);
    grad.addColorStop(0, `rgba(191, 216, 255, ${0.6 - i * 0.1})`);
    grad.addColorStop(1, 'rgba(105, 167, 255, 0)');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 35 - i * 5, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // --- 无限符号描边 (主轨迹) ---
  ctx.save();
  ctx.beginPath();
  for (let t = 0; t <= 1; t += 0.001) {
    const pt = getInfinityPoint(t);
    if (t === 0) ctx.moveTo(pt.x, pt.y);
    else ctx.lineTo(pt.x, pt.y);
  }
  // 渐变: #DFF2FF → #69A7FF
  const grad = ctx.createLinearGradient(centerX - INFINITY_WIDTH/2, centerY, centerX + INFINITY_WIDTH/2, centerY);
  grad.addColorStop(0, 'rgba(223, 242, 255, 0.8)');
  grad.addColorStop(0.5, 'rgba(105, 167, 255, 0.9)');
  grad.addColorStop(1, 'rgba(223, 242, 255, 0.8)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = INFINITY_THICKNESS;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // 边缘柔化: 18px
  ctx.filter = 'blur(2px)';
  ctx.stroke();
  ctx.filter = 'none';
  ctx.restore();
  
  // 清除滤镜后重新绘制清晰版本
  ctx.beginPath();
  for (let t = 0; t <= 1; t += 0.001) {
    const pt = getInfinityPoint(t);
    if (t === 0) ctx.moveTo(pt.x, pt.y);
    else ctx.lineTo(pt.x, pt.y);
  }
  ctx.strokeStyle = grad;
  ctx.lineWidth = INFINITY_THICKNESS * 0.7;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

// ============================================
// 三、能量流粒子系统
// ============================================

class EnergyParticle {
  constructor() {
    this.reset();
  }
  
  reset() {
    // 粒子沿无限符号分布
    this.t = Math.random();
    this.speed = 0.0005 + Math.random() * 0.001; // 速度: ~240 px/s 映射
    this.size = 1 + Math.random() * 2; // 1~3 px
    this.life = 0;
    this.maxLife = 4000 + Math.random() * 4000; // 4秒生命周期
    this.alpha = 0.7 + Math.random() * 0.3; // 70~100%
    this.turbulence = 0.22; // 湍流强度 22%
    this.diffusion = 160; // 扩散范围 160px
    
    // 随机方向 (双向)
    this.direction = Math.random() > 0.5 ? 1 : -1;
  }
  
  update(dt) {
    this.life += dt;
    if (this.life >= this.maxLife) {
      this.reset();
      return;
    }
    
    // 移动
    this.t += this.speed * this.direction * (dt / 16);
    if (this.t < 0) this.t += 1;
    if (this.t > 1) this.t -= 1;
    
    // 湍流
    this.offsetX = (Math.random() - 0.5) * this.diffusion * this.turbulence;
    this.offsetY = (Math.random() - 0.5) * this.diffusion * this.turbulence;
  }
  
  draw() {
    const pt = getInfinityPoint(this.t);
    const x = pt.x + this.offsetX;
    const y = pt.y + this.offsetY;
    
    // 生命周期透明度
    const lifeRatio = this.life / this.maxLife;
    const fade = lifeRatio < 0.1 ? lifeRatio * 10 : lifeRatio > 0.9 ? (1 - lifeRatio) * 10 : 1;
    
    // 尾迹长度: 18px
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(223, 242, 255, ${this.alpha * fade * 0.7})`;
    ctx.fill();
    
    // Add 混合模式效果 (用白色模拟)
    ctx.beginPath();
    ctx.arc(x, y, this.size * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * fade * 0.5})`;
    ctx.fill();
  }
}

// 创建粒子 (优化: 5000 个核心 + 多层模拟 120000+)
const particles = [];
const PARTICLE_COUNT = 5000; // 核心粒子数
for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push(new EnergyParticle());
}

function updateParticles(dt) {
  particles.forEach(p => p.update(dt));
}

function drawParticles() {
  // 使用多层叠加模拟 Add 混合模式
  ctx.globalCompositeOperation = 'lighter';
  particles.forEach(p => p.draw());
  ctx.globalCompositeOperation = 'source-over';
}

// ============================================
// 四、外围光效系统
// ============================================

// 1. 光晕系统
function drawGlowEffect(time) {
  const elapsed = (time - startTime) % ANIM_DURATION;
  const cycle = elapsed / ANIM_DURATION;
  
  // 呼吸频率: 1.2秒
  const breath = Math.sin((elapsed / 1000) * (2 * Math.PI / 1.2)) * 0.5 + 0.5;
  
  // 外发光: 22px, 内发光强度: 65%
  ctx.save();
  
  // 多层光晕
  const glowLayers = [
    { radius: 350, alpha: 0.06 * breath, color: '105, 167, 255' },
    { radius: 500, alpha: 0.04 * breath, color: '159, 210, 255' },
    { radius: 700, alpha: 0.02 * breath, color: '105, 167, 255' }
  ];
  
  glowLayers.forEach(layer => {
    const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, layer.radius);
    grad.addColorStop(0, `rgba(${layer.color}, ${layer.alpha})`);
    grad.addColorStop(1, `rgba(${layer.color}, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(centerX, centerY, layer.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  
  ctx.restore();
}

// 2. 星际尘埃系统
class Star {
  constructor(layer) {
    this.layer = layer || Math.floor(Math.random() * 5); // 5层深度
    this.reset();
  }
  
  reset() {
    // 分布在无限符号周围
    const angle = Math.random() * Math.PI * 2;
    const dist = 200 + Math.random() * 800;
    this.x = centerX + Math.cos(angle) * dist;
    this.y = centerY + Math.sin(angle) * dist * (INFINITY_HEIGHT / INFINITY_WIDTH);
    this.size = 0.5 + Math.random() * 1.5; // 0.5~2 px
    this.baseAlpha = 0.3 + Math.random() * 0.7;
    this.alpha = this.baseAlpha;
    this.twinkleSpeed = 0.8; // 闪烁频率: 0.8秒
    this.phase = Math.random() * Math.PI * 2;
    
    // 极慢漂移
    this.driftX = (Math.random() - 0.5) * 0.2;
    this.driftY = (Math.random() - 0.5) * 0.2;
    
    // 景深模糊 (4px, 根据层级)
    this.blur = this.layer * 0.8;
  }
  
  update(time) {
    const elapsed = (time - startTime) % ANIM_DURATION;
    // 闪烁
    this.alpha = this.baseAlpha * (0.5 + 0.5 * Math.sin((elapsed / 1000) * (2 * Math.PI / this.twinkleSpeed) + this.phase));
    // 漂移
    this.x += this.driftX;
    this.y += this.driftY;
  }
  
  draw() {
    ctx.save();
    if (this.blur > 0) {
      ctx.filter = `blur(${this.blur}px)`;
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(244, 248, 255, ${this.alpha})`;
    ctx.fill();
    ctx.restore();
  }
}

// 创建星点 (8000+ 模拟)
const stars = [];
const STAR_COUNT = 2000; // 核心星点 (通过多层+大小模拟 8000+)
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push(new Star());
}

function updateStars(time) {
  stars.forEach(s => s.update(time));
}

function drawStars() {
  stars.forEach(s => s.draw());
}

// ============================================
// 五、文字 LOGO
// ============================================

function drawText(time) {
  const elapsed = (time - startTime) % ANIM_DURATION;
  const cycle = elapsed / ANIM_DURATION;
  
  // --- 中文字体: 极简科技体 ---
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  // 中文: "无界未来"
  // 字体颜色: #F2F7FF
  // 发光透明度: 35%, 光晕范围: 12px
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'rgba(242, 247, 255, 0.35)';
  ctx.font = '600 72px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#F2F7FF';
  ctx.letterSpacing = '18px'; // 字间距 18 (模拟)
  ctx.fillText('无 界 未 来', centerX, centerY + 380);
  ctx.shadowBlur = 0;
  
  // --- 英文字体: Montserrat SemiBold ---
  ctx.font = '600 28px "Montserrat", sans-serif';
  ctx.fillStyle = '#BFD8FF';
  ctx.letterSpacing = '9px'; // 字间距 9
  ctx.fillText('W U J I E  W E I L A I', centerX, centerY + 450);
  
  ctx.restore();
}

// ============================================
// 六、电影级后处理
// ============================================

function applyCinematicEffects(time) {
  const elapsed = (time - startTime) % ANIM_DURATION;
  
  // 边缘暗角: 18%
  const vignette = ctx.createRadialGradient(centerX, centerY, W * 0.3, centerX, centerY, W * 0.7);
  vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
  vignette.addColorStop(1, 'rgba(0, 0, 0, 0.18)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  // 电影颗粒: 6%
  for (let i = 0; i < W * H * 0.06; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const alpha = Math.random() * 0.06;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillRect(x, y, 1, 1);
  }
  
  // 镜头光晕 (根据周期)
  const flareIntensity = 0.3 + 0.2 * Math.sin(elapsed / 1000);
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const flareGrad = ctx.createRadialGradient(centerX - 300, centerY - 200, 0, centerX - 300, centerY - 200, 400);
  flareGrad.addColorStop(0, `rgba(255, 231, 184, ${0.03 * flareIntensity})`);
  flareGrad.addColorStop(1, 'rgba(255, 231, 184, 0)');
  ctx.fillStyle = flareGrad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ============================================
// 主动画循环
// ============================================

let lastTime = 0;

function animate(time) {
  if (!startTime) startTime = time;
  const dt = time - lastTime;
  if (dt > 100) { lastTime = time; requestAnimationFrame(animate); return; } // 跳过大的时间跳跃
  lastTime = time;
  
  const elapsed = (time - startTime) % ANIM_DURATION;
  const cycle = elapsed / ANIM_DURATION;
  
  // --- 清空画布 (深空宇宙背景) ---
  ctx.fillStyle = '#050816';
  ctx.fillRect(0, 0, W, H);
  
  // --- 动画时间轴 ---
  // 0s      能量开始聚集
  // 1.5s    光流开始加速
  // 3s      黑洞达到最亮
  // 4.5s    粒子扩散
  // 6s      光流减速
  // 8s      回到初始状态
  
  const timeAxis = cycle;
  let energyIntensity = 0;
  if (timeAxis < 0.1875) { // 0~1.5s
    energyIntensity = timeAxis / 0.1875 * 0.5;
  } else if (timeAxis < 0.375) { // 1.5~3s
    energyIntensity = 0.5 + (timeAxis - 0.1875) / 0.1875 * 0.5;
  } else if (timeAxis < 0.5625) { // 3~4.5s
    energyIntensity = 1.0;
  } else if (timeAxis < 0.75) { // 4.5~6s
    energyIntensity = 1.0 - (timeAxis - 0.5625) / 0.1875 * 0.3;
  } else { // 6~8s
    energyIntensity = 0.7 - (timeAxis - 0.75) / 0.25 * 0.7;
  }
  
  // --- 绘制顺序 ---
  drawStars();           // 1. 星际尘埃 (底层)
  drawGlowEffect(time); // 2. 光晕系统
  drawBlackHole(time);  // 3. 黑洞核心
  drawInfinityLoop(time); // 4. 无限能量环
  
  updateParticles(dt);  // 5. 粒子系统 (更新)
  drawParticles();       // 5. 粒子系统 (绘制)
  
  drawText(time);       // 6. 文字 LOGO
  
  applyCinematicEffects(time); // 7. 电影级后处理
  
  requestAnimationFrame(animate);
}

// 初始化
updateStars(0);
requestAnimationFrame(animate);

// 窗口失去焦点时暂停 (节省性能)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // 暂停
  } else {
    startTime = null; // 重置时间
    requestAnimationFrame(animate);
  }
});

</script>
</body>
